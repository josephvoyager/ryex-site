        <div className="glass ring-on-hover" onClick={()=>go('delta')} style={{padding:0,overflow:'hidden',cursor:'pointer'}}>
          <div style={{padding:'14px 20px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div className="lbl">rYield vaults</div>
              <div className="num" style={{fontSize:18,fontWeight:700,marginTop:4,color:'var(--lime)'}}>{fmtUSD(ryTotal)} <span style={{fontSize:11,color:'var(--ink-3)',fontWeight:500,marginLeft:6}}>{MY_VAULTS.length} active</span></div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:10,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Earning ({yieldTf})</div>
              <div className="num" style={{fontSize:15,fontWeight:700,color:'var(--pos)'}}>+{fmtUSD(totalYieldFor(ryDaily),2)}{tfSuffix}</div>
            </div>
          </div>
          <table>
            <thead><tr>{['Vault','Deposit','APR','Daily','Yield earned'].map((h,i)=><th key={i} style={{textAlign:i>0?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>
              {MY_VAULTS.map(v=>{
                const yieldEarned = v.dailyYield * v.days;
                return (
                  <tr key={v.symbol}>
                    <td><div style={{display:'flex',alignItems:'center',gap:8}}><div style={{width:22,height:22,borderRadius:11,background:'var(--lime-soft)',display:'flex',alignItems:'center',justifyContent:'center',fontSize:8,fontWeight:700,color:'var(--lime)',fontFamily:'JetBrains Mono'}}>{v.symbol.slice(0,3)}</div><span className="num" style={{fontWeight:700}}>r{v.symbol}</span></div></td>
                    <td className="num" style={{textAlign:'right'}}>{fmtUSD(v.deposited)}</td>
                    <td className="num" style={{textAlign:'right',fontWeight:700,color:'var(--lime)'}}>{v.apr.toFixed(1)}%</td>
                    <td className="num" style={{textAlign:'right',color:'var(--pos)',fontWeight:600}}>+${(v.dailyYield*tfMul).toFixed(2)}</td>
                    <td className="num" style={{textAlign:'right',fontWeight:700,color:'var(--pos)'}}>+${yieldEarned.toFixed(2)}</td>
                  </tr>
                );
              })}
            </tbody>
          </table>
          <div style={{padding:'10px 20px',borderTop:'1px solid var(--line-1)',fontSize:11,color:'var(--cobalt)',fontWeight:600,textAlign:'right'}}>Manage in rYield →</div>
        </div>

        {/* ========== LP Positions ========== */}
        <div className="glass ring-on-hover" style={{padding:0,overflow:'hidden',cursor:'pointer'}} onClick={()=>go('pools')}>
          <div style={{padding:'14px 20px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
            <div>
              <div className="lbl">LP positions</div>
              <div className="num" style={{fontSize:18,fontWeight:700,marginTop:4,color:'var(--violet)'}}>{fmtUSD(lpTotal)} <span style={{fontSize:11,color:'var(--ink-3)',fontWeight:500,marginLeft:6}}>{MY_LP_POSITIONS.length} pools</span></div>
            </div>
            <div style={{textAlign:'right'}}>
              <div style={{fontSize:10,color:'var(--ink-4)',textTransform:'uppercase',letterSpacing:'0.08em'}}>Earning ({yieldTf})</div>
              <div className="num" style={{fontSize:15,fontWeight:700,color:'var(--pos)'}}>+{fmtUSD(totalYieldFor(lpDaily),2)}{tfSuffix}</div>
            </div>
          </div>
          <table>
            <thead><tr>{['Pool','Type','Deposit','Daily','Unclaimed'].map((h,i)=><th key={i} style={{textAlign:i>1?'right':'left'}}>{h}</th>)}</tr></thead>
            <tbody>
              {MY_LP_POSITIONS.map(p=>(
                <tr key={p.pair}>
                  <td className="num" style={{fontWeight:700}}>{p.pair}</td>
                  <td><span className="chip" style={{fontSize:9,background:p.type==='V3'?'var(--violet-soft)':'var(--cobalt-soft)',color:p.type==='V3'?'var(--violet)':'var(--cobalt)',borderColor:p.type==='V3'?'oklch(0.72 0.16 300 / 0.3)':'var(--cobalt-line)'}}>{p.type}</span></td>
                  <td className="num" style={{textAlign:'right'}}>{fmtUSD(p.deposited)}</td>
                  <td className="num" style={{textAlign:'right',color:'var(--pos)',fontWeight:600}}>+${(p.dailyYield*tfMul).toFixed(2)}</td>
                  <td className="num" style={{textAlign:'right',color:'var(--lime)',fontWeight:700}}>+${p.unclaimed.toFixed(2)}</td>
                </tr>
              ))}
            </tbody>
          </table>
          <div style={{padding:'10px 20px',borderTop:'1px solid var(--line-1)',display:'flex',alignItems:'center',justifyContent:'space-between',gap:10}}>
            <div style={{fontSize:11,color:'var(--ink-3)'}}>Unclaimed rewards: <span className="num" style={{color:'var(--lime)',fontWeight:700,fontSize:12}}>${lpUnclaimed.toFixed(2)}</span></div>
            <div style={{display:'flex',gap:8,alignItems:'center'}}>
              <button className="btn btn-primary" style={{padding:'5px 14px',fontSize:11,fontWeight:600}} disabled={lpUnclaimed<=0} onClick={(e)=>e.stopPropagation()}>Claim all</button>
              <span style={{fontSize:11,color:'var(--cobalt)',fontWeight:600}}>Manage in Pool →</span>
            </div>
          </div>
        </div>
      </div>

      {/* Recent activity */}
      <div className="glass" style={{padding:0,overflow:'hidden'}}>
        <div style={{padding:'14px 20px',borderBottom:'1px solid var(--line-1)'}}>
          <div className="lbl">Recent activity</div>
        </div>
        <div style={{padding:'4px 0'}}>
          {[
            ['Opened','BTC Long 2× · $20,000','2h ago','var(--pos)'],
            ['Minted','0.115 rBTC · $7,984','2h ago','var(--cobalt)'],
            ['Deposited','$2,000 into rWTI vault','6h ago','var(--lime)'],
            ['Funding','+$12.40 rWTI short','8h ago','var(--pos)'],
            ['LP fees','+$4.82 rBTC/USDC','1d ago','var(--violet)'],
            ['Closed','ETH Long 2× · +$1,464','1d ago','var(--pos)'],
          ].map(([a,b,c,col],i)=>(
            <div key={i} style={{padding:'10px 20px',borderBottom:i<5?'1px solid var(--line-1)':'none',display:'flex',alignItems:'center',gap:10}}>
              <div style={{width:6,height:6,borderRadius:3,background:col,flexShrink:0}}/>
              <div style={{flex:1,minWidth:0}}>
                <span style={{fontSize:12,fontWeight:600}}>{a}</span>
                <span style={{fontSize:11,color:'var(--ink-3)',marginLeft:8}}>{b}</span>
              </div>
              <div style={{fontSize:10,color:'var(--ink-4)',fontFamily:'JetBrains Mono',flexShrink:0}}>{c}</div>
            </div>
          ))}
        </div>
      </div>
    </div>
  );
}

Object.assign(window, {MintPage,SwapPage,PoolsPage,DeltaPage,LiqPage,DashPage});

function TopNav({page,setPage}){
  return (
    <header style={{display:'flex',alignItems:'center',padding:'0 18px',height:56,borderBottom:'1px solid var(--line-1)',background:'linear-gradient(180deg, rgba(12,12,18,0.65), rgba(12,12,18,0.45))',backdropFilter:'blur(20px) saturate(1.1)',WebkitBackdropFilter:'blur(20px) saturate(1.1)',position:'sticky',top:0,zIndex:50,gap:22}}>
      <div style={{display:'flex',alignItems:'center',gap:10}}>
        <LOGO/>
        <div style={{display:'flex',alignItems:'center',gap:8}}>
          <span style={{fontSize:17,fontWeight:800,letterSpacing:'-0.02em'}}>RYex</span>
          <span style={{fontSize:9,fontWeight:700,letterSpacing:'0.14em',color:'oklch(0.80 0.15 75)',padding:'3px 7px',border:'1px solid oklch(0.80 0.15 75 / 0.35)',background:'oklch(0.80 0.15 75 / 0.10)',borderRadius:4,textTransform:'uppercase',fontFamily:'JetBrains Mono,monospace',lineHeight:1}}>Demo</span>
        </div>
      </div>
      <nav style={{display:'flex',alignItems:'center',gap:2,marginLeft:20}}>
        {NAV.map(n=>{const active=page===n.id; return (
          <button key={n.id} onClick={()=>setPage(n.id)} style={{padding:'7px 14px',borderRadius:7,border:'none',background:active?'var(--glass-hover)':'transparent',color:active?'var(--ink-1)':'var(--ink-3)',cursor:'pointer',fontSize:12,fontWeight:active?600:500,boxShadow:active?'var(--shadow-inset)':'none'}}>
            {n.label}

      <div style={{flex:1}}/>
      <div className="chip" style={{background:'var(--pos-soft)',color:'var(--pos)',borderColor:'oklch(0.78 0.17 150 / 0.3)',padding:'3px 10px'}}>

function TweaksPanel({tweaks,setTweaks,onClose}){
  const set = (k,v) => { const n={...tweaks,[k]:v}; setTweaks(n); applyTweaks(n); window.parent.postMessage({type:'__edit_mode_set_keys', edits:{[k]:v}}, '*'); };
  return (
    <div style={{position:'fixed',bottom:20,right:20,zIndex:400,width:300}} className="glass">
      <div style={{padding:'12px 16px',borderBottom:'1px solid var(--line-1)',display:'flex',alignItems:'center',justifyContent:'space-between'}}>
        <div className="serif" style={{fontSize:18}}>Tweaks</div>
        <button className="btn-ghost" onClick={onClose} style={{padding:4,cursor:'pointer',borderRadius:4}}><I.x/></button>
      </div>
      <div style={{padding:16,display:'flex',flexDirection:'column',gap:14}}>
        <div>
          <div className="lbl" style={{marginBottom:8}}>Accent</div>
          <div style={{display:'grid',gridTemplateColumns:'repeat(4,1fr)',gap:6}}>
            {[['lime','oklch(0.84 0.17 128)'],['cobalt','oklch(0.70 0.17 258)'],['violet','oklch(0.72 0.16 300)'],['amber','oklch(0.80 0.15 75)']].map(([k,c])=>(
              <button key={k} onClick={()=>set('accent',k)} style={{padding:8,border:tweaks.accent===k?`1.5px solid ${c}`:'1px solid var(--line-1)',borderRadius:7,background:'var(--bg-inset)',cursor:'pointer',display:'flex',flexDirection:'column',alignItems:'center',gap:4}}>
                <div style={{width:20,height:20,borderRadius:4,background:c}}/>
                <span style={{fontSize:9,color:'var(--ink-3)',textTransform:'capitalize'}}>{k}</span>
              </button>
            ))}
          </div>
        </div>
        <div>
          <div className="lbl" style={{marginBottom:8}}>Density</div>
          <div style={{display:'flex',gap:4,padding:3,borderRadius:8,background:'var(--bg-inset)',border:'1px solid var(--line-1)'}}>
            {['comfortable','compact'].map(d=>(
              <button key={d} onClick={()=>set('density',d)} style={{flex:1,padding:'6px 0',border:'none',borderRadius:5,cursor:'pointer',fontSize:11,fontWeight:tweaks.density===d?700:500,textTransform:'capitalize',background:tweaks.density===d?'var(--glass-hover)':'transparent',color:tweaks.density===d?'var(--ink-1)':'var(--ink-3)'}}>{d}</button>
            ))}
          </div>
        </div>
        <div>
          <div className="spread">
            <span className="lbl">Serif headings</span>
            <button onClick={()=>set('serifHeadings',!tweaks.serifHeadings)} style={{width:36,height:20,borderRadius:10,border:'1px solid var(--line-2)',background:tweaks.serifHeadings?'var(--lime-soft)':'var(--bg-inset)',position:'relative',cursor:'pointer'}}>
              <div style={{position:'absolute',top:1,left:tweaks.serifHeadings?18:1,width:16,height:16,borderRadius:8,background:tweaks.serifHeadings?'var(--lime)':'var(--ink-3)',transition:'left .15s ease'}}/>
            </button>
          </div>
        </div>
      </div>
    </div>
  );
}

function App(){
  const [page,setPage] = useState(()=>localStorage.getItem('ryex:page')||'trade');
  const [positions,setPositions] = useState(INIT_POSITIONS);
  const [orders,setOrders] = useState(INIT_ORDERS);
  const [history,setHistory] = useState(INIT_HISTORY);
  const [tweaks,setTweaks] = useState(TWEAKS);
  const [showTweaks,setShowTweaks] = useState(false);

  useEffect(()=>{ localStorage.setItem('ryex:page', page); },[page]);

  // Live tick PnL on positions
  const {getPrice, tick} = useLivePrices() || {};
  useEffect(()=>{
    if (!getPrice) return;
    setPositions(prev=>prev.map(p=>{
      const lp = getPrice(p.asset,p.dex);
      if (!lp.price) return p;
      const priceDelta = lp.price - p.entry;
      const pnl = (p.dir==='Long'?1:-1) * priceDelta / p.entry * p.size;
      const pnlPct = pnl / p.margin * 100;
      return {...p, current:lp.price, pnl:Math.round(pnl), pnlPct:+pnlPct.toFixed(2)};
    }));
  },[tick]);

  // Tweaks host integration
  useEffect(()=>{
    const onMsg = (e) => {
      if (e.data?.type==='__activate_edit_mode') setShowTweaks(true);
      if (e.data?.type==='__deactivate_edit_mode') setShowTweaks(false);
    };
    window.addEventListener('message', onMsg);
    window.parent.postMessage({type:'__edit_mode_available'}, '*');
    return ()=>window.removeEventListener('message', onMsg);
  },[]);

  const shared = {positions,setPositions,orders,setOrders,history,setHistory};

  return (
    <div style={{minHeight:'100vh'}}>
      <TopNav page={page} setPage={setPage}/>
      <main data-screen-label={NAV.find(n=>n.id===page)?.label}>
        {page==='trade' && <TradePage {...shared}/>}
        {page==='mint'  && <MintPage/>}
        {page==='swap'  && <SwapPage/>}
        {page==='pools' && <PoolsPage/>}
        {page==='delta' && <DeltaPage/>}
        {page==='liq'   && <LiqPage/>}
        {page==='dash'  && <DashPage positions={positions} setPage={setPage}/>}
      </main>
      {showTweaks && <TweaksPanel tweaks={tweaks} setTweaks={setTweaks} onClose={()=>setShowTweaks(false)}/>}
    </div>
  );
}

function Root(){
  return (
    <PriceProvider>
      <App/>
    </PriceProvider>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<Root/>);


} catch(e) {
  var root = document.getElementById('root');
  if (root) root.innerHTML = '<div style="padding:40px;max-width:900px;margin:40px auto;font-family:Inter,sans-serif;color:#eee;background:#1a1a20;border:1px solid #333;border-radius:12px"><h2 style="color:#ff8080">App error</h2><pre style="background:#000;color:#eee;padding:16px;border-radius:8px;overflow:auto;white-space:pre-wrap;font-size:12px">'+(e.stack||e.message||String(e))+'</pre></div>';
  throw e;
}
</script>
</body>
</html>
